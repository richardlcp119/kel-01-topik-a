version: '3.8'

services:
  db:
    image: mariadb:latest
    restart: always
    env_file:
      - ../.env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp_network

  app:
    image: wordpress:latest
    restart: always
    depends_on:
      - db
    env_file:
      - ../.env
    volumes:
      - wp_data:/var/www/html
    networks:
      - wp_network

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - wp_network

networks:
  wp_network:
    driver: bridge

volumes:
  db_data:
  wp_data: